<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Price Predictor</title>

    <!-- Bootstrap CSS (for styling) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

    <div class="container">
        <div class="row justify-content-center">
            <div class="card mt-5" style="width: 60%;">
                <div class="card-header text-center">
                    <h1>Welcome to House Price Predictor</h1>
                </div>

                <div class="card-body">
                    <form method="post" accept-charset="utf-8">

                        <div class="row">
                            <div class="col-md-6 form-group text-center mb-3">
                                <label><b>Select the Location:</b></label>
                                <select class="select-picker form-control" id="location" name="location" required>
                                    <option value="" disabled selected>Select Location</option>
                                    <option value="1st Block Jayanagar">1st Block Jayanagar</option>
                                    <option value="Whitefield">Whitefield</option>
                                    <option value="Indiranagar">Indiranagar</option>
                                    <option value="Electronic City">Electronic City</option>
                                    <!-- Add more locations as needed -->
                                </select>
                            </div>

                            <div class="col-md-6 form-group text-center mb-3">
                                <label><b>Enter BHK:</b></label>
                                <input type="number" class="form-control" id="bhk" name="bhk" placeholder="Enter number of BHK" required>
                            </div>

                            <div class="col-md-6 form-group text-center mb-3">
                                <label><b>Enter Square Feet Area:</b></label>
                                <input type="number" class="form-control" id="sqft" name="sqft" placeholder="Enter total area" required>
                            </div>

                            <div class="col-md-6 form-group text-center mb-3">
                                <label><b>Enter Number of Bathrooms:</b></label>
                                <input type="number" class="form-control" id="bath" name="bath" placeholder="Enter number of bathrooms" required>
                            </div>

                            <div class="col-md-12 text-center mt-3">
                                <button type="submit" class="btn btn-primary">Predict Price</button>
                            </div>
                        </div>
                    </form>

                    {% if prediction %}
                        <div class="alert alert-success text-center mt-4">
                            <h4>Estimated Price: ₹ {{ prediction }} Lakhs</h4>
                        </div>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>

</body>
</html>
